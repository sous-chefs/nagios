---
name: ci

"on":
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-unit:
    uses: sous-chefs/.github/.github/workflows/lint-unit.yml@8.0.2
    permissions:
      actions: write
      checks: write
      contents: read
      issues: write
      pull-requests: write
      statuses: write

  integration:
    needs: lint-unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os:
          - "almalinux-8"
          - "almalinux-9"
          - "centos-stream-9"
          - "debian-12"
          - "debian-13"
          - "fedora-latest"
          - "oraclelinux-8"
          - "oraclelinux-9"
          - "rockylinux-8"
          - "rockylinux-9"
          - "ubuntu-2204"
          - "ubuntu-2404"
        suite:
          - "default"
          - "ldap"
          - "nginx"
          - "pagerduty"
          - "source"
          - "swappable-config"

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install Chef
        uses: sous-chefs/.github/.github/actions/install-workstation@8.0.2

      - name: Dokken
        uses: actionshub/test-kitchen@3.0.0
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
        with:
          suite: ${{ matrix.suite }}
          os: ${{ matrix.os }}
