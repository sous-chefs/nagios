---
driver:
  name: vagrant
  network:
    - ["forwarded_port", {guest: 80, host: 8080}]

provisioner:
  name: chef_infra
  product_name: chef
  enforce_idempotency: true
  multiple_converge: 3
  deprecations_as_errors: true

verifier:
  name: inspec

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: centos-stream-9
  - name: debian-12
  - name: debian-13
  - name: fedora-latest
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-8
  - name: rockylinux-9
  - name: ubuntu-22.04
  - name: ubuntu-24.04

x-run-lists:
  default: &default_run_list
    - recipe[test::default]
    - role[monitoring]
  ldap: &ldap_run_list
    - recipe[test::server_package_ldap]
    - role[monitoring]
  source: &source_run_list
    - recipe[test::server_source]
    - role[monitoring]
  swappable_config: &swappable_config_run_list
    - recipe[test::swappable_config]
    - role[monitoring]
  pagerduty: &pagerduty_run_list
    - recipe[test::pagerduty]
    - role[monitoring]
  nginx: &nginx_run_list
    - recipe[test::nginx]
    - role[monitoring]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
    inputs:
      install_method: 'package'

suites:
  - name: default
    provisioner:
      named_run_list: default
    run_list: *default_run_list
    verifier: *default_verifier
  - name: ldap
    provisioner:
      named_run_list: ldap
    run_list: *ldap_run_list
    verifier:
      inspec_tests:
        - path: test/integration/default
      inputs:
        install_method: 'package'
        ldap_auth: true
  - name: source
    provisioner:
      named_run_list: source
    run_list: *source_run_list
    verifier:
      inspec_tests:
        - path: test/integration/server_source
      inputs:
        install_method: 'source'
  - name: swappable-config
    provisioner:
      named_run_list: swappable_config
    run_list: *swappable_config_run_list
    verifier:
      inspec_tests:
        - path: test/integration/default
        - path: test/integration/swappable_config
      inputs:
        install_method: 'package'
  - name: pagerduty
    provisioner:
      named_run_list: pagerduty
    run_list: *pagerduty_run_list
    verifier:
      inspec_tests:
        - path: test/integration/pagerduty
  - name: nginx
    provisioner:
      named_run_list: nginx
    run_list: *nginx_run_list
    verifier: *default_verifier
